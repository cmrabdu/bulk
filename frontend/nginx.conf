server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Assets fingerprintés de Vite : cache long immuable.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA (react-router) : toute route non-fichier retombe sur index.html.
    # (Caddy route déjà /api/* vers le backend en amont, ça n'arrive pas ici.)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
